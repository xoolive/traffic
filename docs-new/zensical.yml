site_name: traffic
site_description: Air traffic data processing with Python
site_url: https://traffic-viz.github.io
repo_url: https://github.com/xoolive/traffic
repo_name: xoolive/traffic

docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: overrides
  favicon: assets/favicon/favicon.ico
  logo: assets/logo/logo_small.png
  font:
    text: "Inter"
    code: "JetBrains Mono"
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - assets/stylesheets/extra.css
  - assets/stylesheets/observable.css
  - assets/stylesheets/traffic.css
  - https://unpkg.com/leaflet@1.9.4/dist/leaflet.css

extra_javascript:
  - https://unpkg.com/leaflet@1.9.4/dist/leaflet.js

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - ../src
          options:
            docstring_style: sphinx
            merge_init_into_class: true
            scoped_crossrefs: true
            relative_crossrefs: true
            show_source: false
            show_root_heading: true
            show_root_toc_entry: false
            show_signature_annotations: true
            separate_signature: true

nav:
